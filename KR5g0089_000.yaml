front:
  text: 玄壇刋誤論笙七
  hash: sha256:e1f392d9c8faadb12a724d1c0dfc6b5a7ae3d842e61caf7a9150919ff32ebe22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0089_HFL_000-001a, image: hfl/1005/1005-004.png}
body:
  text: 悟微子張若海集悟微子世參簪褐業在焚修三洞齊科誠為巳任因循而巳踳駮有疑未遇通人無所質正一日有霓襟雲帔者云自天台四明而來容止粹和瞻視端肅不言姓氏稱雲光先生誠方外逍遙之人也儒釋該通仍精三洞科教由是捨䇿憩止獲與之遊且曰咸洛江湖甌閩隴蜀仙壇靈嶽皆得遍遊每見齊醮舊儀不免倒置子之習誤能服義而改之乎悟微子曰小人顓愚欣聞良訓稽首作禮𦍒得摳衣凡蒙指疵書諸紳帶其玄壇謬誤有二十品目實前賢未曽啇榷輒思流行奉三天之法者目之曰玄壇刋誤論無或執迷而違義也論入靖品第一雲光先生曰凡修齊三日前道士入齊堂靖室澡雪襟神止息妄念不履殗穢不聽笙歌端然一心唯在齊法而巳今之道士預於齊官者能孤潔無雜常自默朝造次升壇固無觸穢猶於教法須示規繩雖云道德內充亦在威儀外備而苟非此輩寧免混淆豈可旦在塵埃暮登陛級俾其自省汝意安乎若宫觀之中不能三日或一日二日亦可也俗家修設一晝夜入精其義且通悟微子稽首曰敬聞命矣重論入靖品第二悟微子白先生曰入靖之事近多因循苟能至誠豈在預事雲光先生曰此乃庸俗道士欺謾庸俗之夫非通論也假如國家有事郊廟其齊官太常卿上至太尉並散齊四日致齊三日受戒誓後不吊喪問疾不作樂不判刑殺文書不行刑罰不親穢事不入妻妾之房祭前一夜都省鎖宿明日御史清道其所往郊廟之路金吾司勒地界禁斷師僧孝子喪車不許觸汚齊官有瀆尊神也況三清上聖乎悟微子曰若在官宅即然若在宫觀道士各居靖室豈俟齊時方更入靖得無自鄙耶先生曰不然道士所居靖室是寢止之室非入靖朝真之室今宫觀有精思堂凝神堂思微堂存真堂者即是入靖之所也若就所居之室即精思諸堂復設何用悟微子曰誠哉斯言爾後敢不依禀論說戒署職品第三雲光先生曰說戒署職修齊前若入靖三日即於初日戒誓若入靖一日即於其日清旦戒誓集道衆於法堂玄中法師前啓靈寶自然朝髙功法師即宣揚戒誓各令淨心專於齊事秉持教戒之旨也然後署六職各供其職不得有闕說戒署職畢即監齊宣職狀後榜白於齊堂中是也今睹修齊道士當日齊集至夜自玄中法師前齊主投詞法師關告後便升壇行事至重謝後却轉洞案說戒署職此乃先行其事然後署職何倒錯之甚也悟微子載詳斯禮始覺前科之非而今而後得以遵行重論說戒事品第四悟微子屏肅重白先生曰今之重謝後說戒其來久矣一旦改革豈有說乎先生曰是何言歟是何言歟事之不經何必襲舊復坐吾語汝夫朝真之科與國家禋祀禮同而香蔬殽醴有異享前七日太尉於都省集齊官戒誓云某月某日有事于某廟各揚其職不供其事國有常刑苟致闕遺祭後舉罰未聞徹祭之後方補齊官也今道士登壇重謝後是行一朝法事畢也特地却重說戒聽其戒詞又非齊意自說初入道披度戒文次第乖違庠序顚倒良由昔人不能刋改按用謬科致使後來承此誤本雖云道門髙德曽經校勘吾弗信也一如王侯命官豈可蒞事後方受簡牒子但質於通論必有尚理者為吾攘臂也悟微子聞義方悟前非論發爐品第五雲光先生曰發爐者即髙功法師對三清秉爐關啓修齊之旨也其詞云無上玄元始三氣無極大道元始天尊太上大道君太上老君自然玉陛下然後云臣今奉為大道弟子某官姓名為某事修某齊此乃法師面覿元皇之祖也以上更無上於三清也故不兼稱諸聖矣今之修齊道士稱無上三天玄元始三氣太上老君召出臣身中三五功曹左右官使者是令老君召出身中神也又云當召此間土地速出嚴裝關啓臣今所為某人修某齊者且法象三天建立壇級法師升壇巳在三天之上對御啓奏之次豈合方仗身神喚召土地證明功德大不可也未審土地之神得上三清之壇否兼云嚴裝猶慮祕露也真可笑哉況道士受法籙者九州社令一階尚不許入神廟恐與鬼神不安今召土地之神登三清之壇俾其何以安處假如人臣朝對次或令從者喚街吏市胥預丹墀證明功業其可耶其不可耶悟微子鞠躬禀聽慙汗沾渙不知昔人之誤也論方懴品第六雲光先生曰法師上十方香是先降十方真氣自下升上然後到上清至尊前凡對三清啓奏不兼稱諸天尊號者所以尊三清而巳乃是土無二王尊無二上者也今之修齊者宣詞及三上香後却禮十方兼之懴謝此又非也無是入靖時道士以靈寶自然朝為諸齊之祖諸齊法出洞玄靈寶部所以為齊之祖也禮十方靈寶天尊或兼懴謝不在壇上而在法堂也其懴文或以紙書或以板札安於十方香几前不宜輒朝次宣讀禱祝下方天尊也而又更禮日月星宿五嶽洞府三河四海九江水帝及上方下方并經寶等亦有懴文謂之二十方也更向其中穿鑿凡唱禮禮東方九拜南方三拜西方七拜北方五拜四維各三拜上方三十二拜下方二十四拜此不軌之甚也十方天尊與日月星辰於三清前猶可庶幾五嶽水府之神大不穩便也五嶽又不禮海外五嶽𡱈見之甚也假如人臣對君有事啓奏或有關宰臣者須候退朝巡廳詣宅啓白豈可輒於對揚之次回首啓白宰相也夫三清即帝也十方天尊即臣也天上人間尊卑無異宣讀方懴於理未安悟微子退思其言髙卑甚當敢不遵聽也論去繁就簡品第七悟微子白先生曰方懴之言既巳聞義但行之斯久人其從之乎先生曰禮主於敬不尚於繁方懴之文後人所述雖詞華典贍首露周旋豈令其上聖徘徊待聽下方祈懴非所宜也昔者季文子祭繼之以燭有司跛倚以臨祭雖有莊敬之心亦巳怠矣他日子路預祭始質明而祭晏朝而退孔子嘆曰孰謂由也不知禮乎此即多其簡敬也今開三日道場凡有十一朝法事至於方懴尚占九朝齊主齊官久立行事跛倚壇席其何以堪但書懴文一讀而巳不猶愈乎悟微子再白先生曰或於九朝之中每朝均讀可乎先生曰必不得巳須要宣文即三日九朝之中於重謝退朝之後宣讀三兩遍亦可只須更換懴文不可三日之內重讀舊文也既不賖延法席又不勞怠齊官推此而行有何不可且禮非從天降非從地出酌人情而巳苟繁略有節誰謂不然悟微子拜手謝曰從事於斯也論禮拜品第八雲光先生曰恭默心拜不更煩文凡屈伸跪起內以心敬外以形恭內外相應亦謂五體投地也稽首者一拜額至地頓首者亦是一拜以頭頓地也再拜者兩拜也通云稽首頓首再拜者是四拜也誠惶誠恐者即是握簡曲躬局地兩過捧簡長跪少頃又局地兩過而止是也今之修齊者皆云誠惶誠恐稽首頓首再拜却只禮三拜應數而巳故無首體投地之敬遞相倣此於禮甚虧悟微子曰而今而後奉而行之論轉經品第九雲光先生曰夫經者太上所說人之所禀持或修之於身或修之於國此乃奉經之旨也凡修齊轉經本在法堂內法堂即宫觀正殿後有說法堂中列經寶左列玄中法師右列天師若在宫宅即對壇場後鋪設供養三寶便為法堂也左右列師子座兩所每登壇退朝即高功法師與齊官於堂開啓經文畢即都講與侍經升座演暢經義開示未悟也故侍經簡文云衛師子之兩座即其旨也今之修齊者每朝奏罷却於壇上唱禮轉經甚無謂也又開經前有呪誦是法師存思密念而巳今道衆不候法師存念下次輒便厲聲朗誦不其乖乎悟微子謹佩良訓不敢失墜論勑壇品第十雲光先生曰勑壇者本是勑水也降五方五龍真氣之水解除殗穢也在宫觀靈壇神仙福地即勿用禁勑自有靈官護衛何邪穢之解袚所慮營備齊物及人物往來惹諸穢氣或須行解也若在宫宅修齊即宜全行解禁法事但請降五方五童君真氣是也今之修齊者須云東方青童君身長九千萬丈從官九千萬人南西北方皆法方氣又何勞定其長短拘其人數也又云飛仙神仙日月星宿三河四海兵馬各億萬騎又何多也尺云可蓋屋三重繞壇三匝何三清玄壇既設臨時方役靈官蓋屋也又云上張天羅下布地網何三清壇上更張羅網也鄙猥之語爾其去之悟微子豁然拜手禀命也論醮壇品第十一雲光先生曰醮者祭之别名也肉食謂之祭禴食謂之醮凡修齊上至三清上境次乃十極諸真下及五帝三官神仙靈官之屬三日三夜香燈幡花列位供養何散齊之日而又用酒醮靈官也若行之於未散之前且爽尊卑之禮行之於既散之後又妨導從之儀天真既預於齊饈靈官豈須於酒醮但於散席之旦就靈官位供養醮饌茶湯即是也通鑒之士無或致疑悟微子曰以酒為醮行之既久頓廢可乎先生曰若單設醮席自有科儀與齊法本殊不用酒脯又何嫌也然齊壇靈官三日受香飯之供豈宜不隨軒駕遲留破齊求之俗人尚猶不可所務允當勿信凡庸悟微子受教永永禀佩論三晝四夜品第十二雲光先生曰凡修齊云九時行道者三晝四夜也兼言功拜表都十一朝也九朝即第一夜至明日五更及齊時第二第三日各是三朝凡九朝也至第三夜一朝號言功法事至第四日五更為拜表荷恩法事共十一朝也今修齊者行十一朝法事又都不分别言功荷恩之禮至第四日又讀無上齊詞云表白散齊此乃十二朝也何重疊之甚乎悟微子曰小子鄙懵不知仰荷開示論唱道及登壇品第十三雲光先生曰凡修齊逐朝登壇之前法師與官班立於玄中法師前髙功法師啓白後都講唱道場衆等人各運心歸命三寶讃詠行道其所唱云人各運心者即是令法師齊官運心玄極注想宸嚴旨在默念冥思且非齊聲競念也今之修齊者不原都講所唱之理不依注想運心之規厲其音聲念其功德至於聖真品位罔間尊卑而又每登靈壇元自地戶升旋行至上級朝退即自天門降之今之齊者升自地戶降自地戶了不履於天門不唯靈官所誅抑乃識者所誚悟微子稽首謹佩明言論齊粥前後誦念品第十四雲光先生曰凡登堂赴坐或齊或粥之前先行淨後行香然舒巾畢供物至都講聲磬者三法師默念出生呪畢復聲磬二次乃齊也齊畢又聲磬三都講吟為諸讃及回向功德讃畢即齊官起也今之修齊者於齊粥後又念功德上至三清上尊次及五帝三官真仙神仙靈官之屬抑又過也且齊官每登壇朝奏莫不俯仰兢兢衣冠濟濟對揚宸極尚慮虧儀豈可於端坐飽食之間念上聖天真之號仍云念斯功德回福齊家即不知晝夜朝修功德何在須俟飽飫復念聖真唯知斆彼釋徒罔畏掇其天譴悟微子頓覺前誤俯伏謝之論齊主心詞品第十五雲光先生曰凡修齊一晝兩夜或三晝三夜或七晝七夜並須詞文逐日更換在齊意即不殊於詞言須各别不可遍遍宣讀元上詞文也初建齊一詞述其大綱所為意度未可便有祈禱也次一詞方露禱祈意旨末一詞首謝浼黷聖聽及荷恩之旨也今之修齊者不計日數即執一文重重宣揚得不撓於聽覽也譬如世之帝王臣下有事謄奏或一表再表只用舊詞可乎比之一人尚猶未可論及三寶某何以安悟微子扣頭作禮誓禀明訓論教化法式品第十六雲光先生曰教化法式聖人之垂範者也教者教也化者變也謂敷弘太上之教廣變人天之化教化既布即有法式謂軌則制度也法式既立即有科律律以檢行科律既立即有禁戒戒以檢心禁戒既立即有威儀有威可畏有儀可象威儀既備即俯仰進止庠序雅步存真念道登壇朝奏禮拜稽首動無虧闕方合教化法式也且夫弘妙有之教合虛無之理豈可不稽典誥而肆胸襟也哉悟微子頓首禀命論凡修齊用樂品第十七雲光先生曰凡修齊行道謂之朝禮禮既行矣樂亦備焉夫樂奏之圓丘天神降奏之方澤地祗升鼓之以和八風播之以正四序行禮作樂者所以通天地而交神明也謹按仙書玉京山諸天仙聖衆奏鈞天廣樂鼓雲璈吹赤簫鸞歌鳯舞霓幢羽葆燃香捧花步虛讃詠旋繞天尊即其事也今之郊廟登歌皆述祖宗之德别無他詞若以尋常之詞不可揚于王庭也而況玉皇上帝之前乎悟微子曰今之殿庭廣陳雜樂巴歌渝舞悉參其間即人間小詩安得不播於步虛哉先生曰帝王宴羣臣號曰示慈惠尚有觀優之樂巴歌下節悉可敷陳若郊廟之詞無非典雅豈容鄙猥預於登歌何況上帝天真之前而用凡俗之語斯不然也悟微子聞義而退論露壇品第十八悟微子白先生曰壇上施屋號曰衆妙臺亦號虛皇臺廣成杜先生論之備矣然古者宫觀皆是露壇今之國家四郊亦是露壇雖有改張曲不合古請垂開示先生曰杜公之論吾無間然但國家諸壇祭享有時雨霑失容其禮即廢今之宫觀本為衆人或力辨建修遇雨而廢即於齊主豈不重勞但能精誠上通何患重簷所障露之與蓋兩不相妨悟微子審聞斯言誠吾心也論坐立功德品第十九悟微子白先生曰今之宫觀三尊同殿而坐乃至三官五帝悉皆塑坐若並令侍立其義可乎先生曰坐立之儀不難辨白宫觀之內各有院宇譬如人世帝王自有正寢三公四相各有廳事至於百執事皆守司存既非趨朝何必拱立若當臨軒之日列班而趨豈容宰相三公相向而坐吾所謂坐立之儀不難辨白正在斯乎但以宫觀之間木雕泥塑臨時坐立不可改更若是繪畫一壇功德並宜立侍即尊卑之禮有叶人情悟微子稽首聞命論齊宴儀品第二十悟微子白先生曰今之帝王宴㑹百執事皆得預坐安有三清齊席須令拱立乎先生曰人世趨朝司儀辨等與夫朝拜三清之禮其事正同此謂朝也非謂宴也既設齊饌即退朝就食又何所妨但三尊前不得不侍立也質於通鑒方諒斯言悟微子默然而退或謂悟微子曰齊醮之儀相傳巳久今之駁雜雅合是非但慮浮淺之夫鄙猥之輩尚執妄說不信格言其如衆口因循久安舛誤吾子所禀殆難行乎答曰吾得之於通方道人質之於博學君子既曰允當豈恤人言苟上合於天真又何憂於俗論𦍒希玄鑒無致詆訶時天福八年上元日於長沙紫極宫寫札傳於同道庶幾刋誤免貽議於識者開吾徒蒙吝也玄壇刋誤論
