  text: 玄壇刋誤論笙七
  hash: sha256:e1f392d9c8faadb12a724d1c0dfc6b5a7ae3d842e61caf7a9150919ff32ebe22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0089_HFL_000-001a, image: hfl/1005/1005-004.png}
body:
  text: 悟微子張若海集悟微子世叅簪褐業在焚修三洞齋科誠爲巳任因循而巳踳駮有疑未遇通人無所質正一日有霓襟雲帔者云自天台四明而來容止粹和瞻視端肅不言姓氏稱雲光先生誠方外逍遥之人也儒釋該通仍精三洞科敎由是捨䇿憩止獲與之遊且曰咸洛江湖甌閩隴蜀仙壇靈嶽皆得徧遊毎見齋醮舊儀不免倒置子之習誤能服義而改之乎悟微子曰小人顓愚欣聞良訓稽首作禮𦍒得摳衣凡蒙指疵書諸紳帶其玄壇謬誤有二十品目實前賢未曽啇㩁輙思流行奉三天之法者目之曰玄壇刋誤論無或執迷而違義也論入靖品第一雲光先生曰凡修齋三日前道士入齋堂靖室澡雪襟神止息妄念不履殗穢不聽笙歌端然一心唯在齋法而巳今之道士預於齋官者能孤潔無雜常自黙朝造次昇壇固無觸穢猶於敎法須示䂓繩雖云道德内充亦在威儀外備而苟非此軰寧免混淆豈可旦在塵埃暮登陛級俾其自省汝意安乎若宫觀之中不能三日或一日二日亦可也俗家修設一晝夜入精其義且通悟微子稽首曰敬聞命矣重論入靖品第二悟微子白先生曰入靖之事近多因循苟能至誠豈在預事雲光先生曰此乃庸俗道士欺謾庸俗之夫非通論也假如國家有事郊廟其齋官太常卿上至太尉並散齋四日致齋三日受戒誓後不吊喪問疾不作樂不判刑殺文書不行刑罰不親穢事不入妻妾之房祭前一夜都省鏁宿明日御史清道其所往郊廟之路金吾司勒地界禁斷師僧孝子喪車不許觸汚齋官有瀆尊神也況三清上聖乎悟微子曰若在官宅即然若在宫觀道士各居靖室豈俟齋時方更入靖得無自鄙耶先生曰不然道士所居靖室是寢止之室非入靖朝眞之室今宫觀有精思堂凝神堂思微堂存眞堂者即是入靖之所也若就所居之室即精思諸堂復設何用悟微子曰誠哉斯言爾後敢不依禀論說戒署職品第三雲光先生曰說戒署職修齋前若入靖三日即於初日戒誓若入靖一日即於其日清旦戒誓集道衆於法堂玄中法師前啟靈寳自然朝髙功法師即宣揚戒誓各令淨心專於齋事秉持敎戒之旨也然後署六職各供其職不得有闕說戒署職畢即監齋宣職狀後牓白於齋堂中是也今睹修齋道士當日齋集至夜自玄中法師前齋主投詞法師關告後便昇壇行事至重謝後却轉洞案說戒署職此乃先行其事然後署職何倒錯之甚也悟微子載詳斯禮始覺前科之非而今而後得以遵行重論說戒事品第四悟微子屏肅重白先生曰今之重謝後說戒其來乆矣一旦改革豈有說乎先生曰是何言歟是何言歟事之不經何必襲舊復坐吾語汝夫朝眞之科與國家禋祀禮同而香蔬殽醴有異享前七日太尉於都省集齋官戒誓云某月某日有事于某廟各揚其職不供其事國有常刑苟致闕遺祭後舉罰未聞徹祭之後方補齋官也今道士登壇重謝後是行一朝法事畢也特地却重說戒聽其戒詞又非齋意自說初入道披度戒文次第乖違庠序顚倒良由昔人不能刋改按用謬科致使後來承此誤本雖云道門髙德曽經校勘吾弗信也一如王侯命官豈可蒞事後方受簡牒子但質於通論必有尚理者爲吾攘臂也悟微子聞義方悟前非論發鑪品第五雲光先生曰發鑪者即髙功法師對三清秉鑪關啓修齋之旨也其詞云无上玄元始三炁无極大道元始天尊太上大道君太上老君自然玉陛下然後云臣今奉爲大道弟子某官姓名爲某事修某齋此乃法師面覿元皇之祖也以上更无上於三清也故不兼稱諸聖矣今之修齋道士稱无上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者是令老君召出身中神也又云當召此間土地速出嚴裝關啓臣今所爲某人修某齋者且法象三天建立壇級法師昇壇巳在三天之上對御啓奏之次豈合方仗身神喚召土地證明功德大不可也未審土地之神得上三清之壇否兼云嚴裝猶慮祕露也眞可笑哉況道士受法籙者九州社令一階尚不許入神廟恐與鬼神不安今召土地之神登三清之壇俾其何以安處假如人臣朝對次或令從者喚街吏市胥預丹墀證明功業其可耶其不可耶悟微子鞠躬禀聽慙汗沾渙不知昔人之誤也論方懴品第六雲光先生曰法師上十方香是先降十方眞炁自下昇上然後到上清至尊前凡對三清啓奏不兼稱諸天尊號者所以尊三清而巳乃是土无二王尊无二上者也今之修齋者宣詞及三上香後却禮十方兼之懴謝此又非也无是入靖時道士以靈寳自然朝爲諸齋之祖諸齋法出洞玄靈寳部所以爲齋之祖也禮十方靈寳天尊或兼懴謝不在壇上而在法堂也其懴文或以紙書或以板札安於十方香几前不宜輙朝次宣讀禱祝下方天尊也而又更禮日月星宿五嶽洞府三河四海九江水帝及上方下方并經寳等亦有懴文謂之二十方也更向其中穿鑿凡唱禮禮東方九拜南方三拜西方七拜北方五拜四維各三拜上方三十二拜下方二十四拜此不軌之甚也十方天尊與日月星辰於三清前猶可庶幾五嶽水府之神大不穩便也五嶽又不禮海外五嶽𡱈見之甚也假如人臣對君有事啓奏或有關宰臣者須候退朝巡廳詣宅啓白豈可輙於對揚之次迴首啓白宰相也夫三清即帝也十方天尊即臣也天上人間尊卑無異宣讀方懴於理未安悟微子退思其言髙卑甚當敢不遵聽也論去繁就簡品第七悟微子白先生曰方懴之言旣巳聞義但行之斯久人其從之乎先生曰禮主於敬不尚於繁方懴之文後人所述雖詞華典贍首露周旋豈令其上聖徘徊待聽下方祈懴非所宜也昔者季文子祭繼之以燭有司跛倚以臨祭雖有莊敬之心亦巳怠矣他日子路預祭始質明而祭晏朝而退孔子嘆曰孰謂由也不知禮乎此即多其簡敬也今開三日道場凡有十一朝法事至於方懴尚占九朝齋主齋官乆立行事跛倚壇席其何以堪但書懴文一讀而巳不猶愈乎悟微子再白先生曰或於九朝之中每朝均讀可乎先生曰必不得巳須要宣文即三日九朝之中於重謝退朝之後宣讀三兩遍亦可只須更換懴文不可三日之内重讀舊文也旣不賖延法席又不勞怠齋官推此而行有何不可且禮非從天降非從地出酌人情而巳苟繁略有節誰謂不然悟微子拜手謝曰從事於斯也論禮拜品第八雲光先生曰恭黙心拜不更煩文凡屈伸跪起内以心敬外以形恭内外相應亦謂五體投地也稽首者一拜額至地頓首者亦是一拜以頭頓地也再拜者兩拜也通云稽首頓首再拜者是四拜也誠惶誠恐者即是握簡曲躬跼地兩過捧簡長跪少頃又跼地兩過而止是也今之修齋者皆云誠惶誠恐稽首頓首再拜却只禮三拜應數而巳故無首體投地之敬逓相倣此於禮甚虧悟微子曰而今而後奉而行之論轉經品第九雲光先生曰夫經者太上所說人之所禀持或修之於身或修之於國此乃奉經之旨也凡修齋轉經本在法堂内法堂即宫觀正殿後有說法堂中列經寳左列玄中法師右列天師若在宫宅即對壇場後鋪設供養三寳便爲法堂也左右列師子座兩所毎登壇退朝即高功法師與齋官於堂開啓經文畢即都講與侍經昇座演暢經義開示未悟也故侍經簡文云衛師子之兩座即其旨也今之修齋者毎朝奏罷却於壇上唱禮轉經甚無謂也又開經前有呪誦是法師存思宻念而巳今道衆不候法師存念下次輙便厲聲朗誦不其乖乎悟微子謹佩良訓不敢失墜論勑壇品第十雲光先生曰勑壇者本是勑水也降五方五龍眞氣之水解除殗穢也在宫觀靈壇神仙福地即勿用禁勑自有靈官護衛何邪穢之解袚所慮營備齋物及人物往來惹諸穢氣或須行解也若在宫宅修齋即宜全行解禁法事但請降五方五童君眞氣是也今之修齋者須云東方青童君身長九千萬丈從官九千萬人南西北方皆法方氣又何勞定其長短拘其人數也又云飛仙神仙日月星宿三河四海兵馬各億萬騎又何多也尺云可蓋屋三重遶壇三匝何三清玄壇旣設臨時方役靈官蓋屋也又云上張天羅下布地網何三清壇上更張羅網也鄙猥之語爾其去之悟微子豁然拜手禀命也論醮壇品第十一雲光先生曰醮者祭之别名也肉食謂之祭禴食謂之醮凡修齋上至三清上境次乃十極諸眞下及五帝三官神仙靈官之屬三日三夜香燈旛花列位供養何散齋之日而又用酒醮靈官也若行之於未散之前且爽尊卑之禮行之於旣散之後又妨導從之儀天眞旣預於齋饈靈官豈須於酒醮但於散席之旦就靈官位供養醮饌茶湯即是也通鑒之士無或致疑悟微子曰以酒爲醮行之旣久頓廢可乎先生曰若單設醮席自有科儀與齋法本殊不用酒脯又何嫌也然齋壇靈官三日受香飯之供豈宜不隨軒駕遲留破齋求之俗人尚猶不可所務允當勿信凡庸悟微子受敎永永禀佩論三晝四夜品第十二雲光先生曰凡修齋云九時行道者三晝四夜也兼言功拜表都十一朝也九朝即第一夜至明日五更及齋時第二第三日各是三朝凡九朝也至第三夜一朝號言功法事至第四日五更爲拜表荷恩法事共十一朝也今修齋者行十一朝法事又都不分别言功荷恩之禮至第四日又讀无上齋詞云表白散齋此乃十二朝也何重疊之甚乎悟微子曰小子鄙懵不知仰荷開示論唱道及登壇品第十三雲光先生曰凡修齋逐朝登壇之前法師與官班立於玄中法師前髙功法師啓白後都講唱道場衆等人各運心歸命三寳讃詠行道其所唱云人各運心者即是令法師齋官運心玄極注想宸嚴旨在黙念冥思且非齊聲競念也今之修齋者不原都講所唱之理不依注想運心之䂓厲其音聲念其功德至於聖眞品位罔間尊卑而又毎登靈壇元自地戸昇旋行至上級朝退即自天門降之今之齋者昇自地戸降自地戸了不履於天門不唯靈官所誅抑乃識者所誚悟微子稽首謹佩明言論齋粥前後誦念品第十四雲光先生曰凡登堂赴坐或齋或粥之前先行淨後行香然舒巾畢供物至都講聲磬者三法師黙念出生呪畢復聲磬二次乃齋也齋畢又聲磬三都講吟爲諸讃及迴向功德讃畢即齋官起也今之修齋者於齋粥後又念功德上至三清上尊次及五帝三官眞仙神仙靈官之屬抑又過也且齋官毎登壇朝奏莫不俯仰兢兢衣冠濟濟對敭宸極尚慮虧儀豈可於端坐飽食之間念上聖天眞之號仍云念斯功德回福齋家即不知晝夜朝修功德何在須俟飽飫復念聖眞唯知斆彼釋徒罔畏掇其天譴悟微子頓覺前誤俯伏謝之論齋主心詞品第十五雲光先生曰凡修齋一晝兩夜或三晝三夜或七晝七夜並須詞文逐日更換在齋意即不殊於詞言須各别不可遍遍宣讀元上詞文也初建齋一詞述其大綱所爲意度未可便有祈禱也次一詞方露禱祈意旨末一詞首謝浼黷聖聽及荷恩之旨也今之修齋者不計日數即執一文重重宣揚得不撓於聽覽也譬如世之帝王臣下有事謄奏或一表再表只用舊詞可乎比之一人尚猶未可論及三寳某何以安悟微子扣頭作禮誓禀明訓論敎化法式品第十六雲光先生曰敎化法式聖人之垂範者也敎者敎也化者變也謂敷弘太上之敎廣變人天之化敎化旣布即有法式謂軌則制度也法式旣立即有科律律以檢行科律旣立即有禁戒戒以檢心禁戒旣立即有威儀有威可畏有儀可象威儀旣備即俯仰進止庠序雅歩存眞念道登壇朝奏禮拜稽首動無虧闕方合敎化法式也且夫弘妙有之敎合虚无之理豈可不稽典誥而肆胷襟也哉悟微子頓首禀命論凡修齋用樂品第十七雲光先生曰凡修齋行道謂之朝禮禮旣行矣樂亦備焉夫樂奏之圓丘天神降奏之方澤地祗昇鼔之以和八風播之以正四序行禮作樂者所以通天地而交神明也謹按仙書玉京山諸天仙聖衆奏鈞天廣樂鼔雲璈吹赤簫鸞歌鳯舞霓幢羽葆燃香捧花歩虚讃詠旋遶天尊即其事也今之郊廟登歌皆述祖宗之德别無他詞若以㝷常之詞不可揚于王庭也而況玉皇上帝之前乎悟微子曰今之殿庭廣陳雜樂巴歌渝舞悉叅其間即人間小詩安得不播於歩虚哉先生曰帝王宴羣臣號曰示慈惠尚有觀優之樂巴歌下節悉可敷陳若郊廟之詞無非典雅豈容鄙猥預於登歌何況上帝天眞之前而用凡俗之語斯不然也悟微子聞義而退論露壇品第十八悟微子白先生曰壇上施屋號曰衆妙臺亦號虚皇臺廣成杜先生論之備矣然古者宫觀皆是露壇今之國家四郊亦是露壇雖有改張曲不合古請垂開示先生曰杜公之論吾無間然但國家諸壇祭享有時雨霑失容其禮即廢今之宫觀本爲衆人或力辨建修遇雨而廢即於齋主豈不重勞但能精誠上通何患重簷所障露之與蓋兩不相妨悟微子審聞斯言誠吾心也論坐立功德品第十九悟微子白先生曰今之宫觀三尊同殿而坐乃至三官五帝悉皆塑坐若並令侍立其義可乎先生曰坐立之儀不難辨白宫觀之内各有院宇譬如人世帝王自有正寢三公四相各有廳事至於百執事皆守司存旣非趨朝何必拱立若當臨軒之日列班而趨豈容宰相三公相向而坐吾所謂坐立之儀不難辨白正在斯乎但以宫觀之間木雕泥塑臨時坐立不可改更若是繪畫一壇功德並宜立侍即尊卑之禮有叶人情悟微子稽首聞命論齋宴儀品第二十悟微子白先生曰今之帝王宴㑹百執事皆得預坐安有三清齋席須令拱立乎先生曰人世趨朝司儀辨等與夫朝拜三清之禮其事正同此謂朝也非謂宴也旣設齋饌即退朝就食又何所妨但三尊前不得不侍立也質於通鑒方諒斯言悟微子黙然而退或謂悟微子曰齋醮之儀相傳巳久今之駁雜雅合是非但慮浮淺之夫鄙猥之軰尚執妄說不信格言其如衆口因循久安舛誤吾子所禀殆難行乎答曰吾得之於通方道人質之於博學君子旣曰允當豈恤人言苟上合於天眞又何憂於俗論𦍒希玄鑒無致詆訶時天福八年上元日於長沙紫極宫寫札傳於同道庶幾刋誤免貽議於識者開吾徒蒙恡也玄壇刋誤論
